<!DOCTYPE html>
<html>
<head>
    <title>Ottawa Smart Course Selector</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .course-card { background: white; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .full { color: red; font-weight: bold; }
        .available { color: green; font-weight: bold; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>
    <h1>🎓 Ottawa High School Course Registration</h1>
    <p>Select your courses for the upcoming semester.</p>

    <div class="course-card">
        <h3>ENG4U-AP: English Grade 12 (AP)</h3>
        <p>Teacher: Mr. Smith | Time: Period 1</p>
        <p class="available">Slots Left: 5</p>
        <button>Register Now</button>
    </div>

    <div class="course-card">
        <h3>SBI4U-AP: Biology Grade 12 (AP)</h3>
        <p>Teacher: Dr. Miller | Time: Period 3</p>
        <p class="full">FULL (Waiting List Only)</p>
        <button disabled>Full</button>
    </div>

    <script>
    // 1. 找到所有的注册按钮
    const buttons = document.querySelectorAll('button');

    // 2. 为每个按钮添加点击事件
    buttons.forEach(button => {
        button.addEventListener('click', function() {
            // 3. 获取这门课的名字 (找到当前按钮上方最近的 h3 标签)
            const courseName = this.parentElement.querySelector('h3').innerText;
            
            // 4. 弹出对话框
            alert("✅ Success! You have registered for: " + courseName);
            
            // 5. 让按钮变色并显示已注册
            this.innerText = "Registered";
            this.style.backgroundColor = "#28a745"; // 变成绿色
            this.disabled = true; // 防止重复点击
            });
        });
    </script>
    
</body>
</html>
